name: Release obsidian plugin

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (example: 1.2.7)"
        required: true
        type: string

permissions:
  contents: write

env:
  PLUGIN_NAME: obsidian-rapid-notes

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists for manual trigger
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: git rev-parse "refs/tags/${{ steps.tag.outputs.tag }}"

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir "$PLUGIN_NAME"
          cp dist/main.js manifest.json styles.css "$PLUGIN_NAME"
          zip -r "$PLUGIN_NAME-${{ steps.tag.outputs.tag }}.zip" "$PLUGIN_NAME"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: |
            ${{ env.PLUGIN_NAME }}-${{ steps.tag.outputs.tag }}.zip
            dist/main.js
            manifest.json
            styles.css
          draft: false
          prerelease: false
